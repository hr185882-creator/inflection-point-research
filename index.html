<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFLECTION OS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #161616;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --accent: #c8a96e;
    --accent-dim: #8a7149;
    --green: #4caf7d;
    --red: #e05555;
    --text: #d4d4d4;
    --text-dim: #7a7a7a;
    --text-bright: #efefef;
    --mono: 'Courier New', Courier, monospace;
    --serif: Georgia, 'Times New Roman', serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── NAV ── */
  #nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 48px;
    background: #0d0d0d;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
  }

  #logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: bold;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    user-select: none;
  }

  #logo span {
    color: var(--accent-dim);
    font-size: 11px;
    margin-left: 6px;
    letter-spacing: 0.08em;
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(76,175,125,0.5); }
    50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(76,175,125,0); }
  }

  #nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #schema-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    background: var(--border);
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  #refresh-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--accent-dim);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-transform: uppercase;
  }

  #refresh-btn:hover { background: var(--accent); color: #0a0a0a; }
  #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── TICKER BAR ── */
  #ticker-bar {
    position: fixed;
    top: 48px; left: 0; right: 0;
    z-index: 99;
    height: 34px;
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
    overflow: hidden;
  }

  .tick-item {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 0 14px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tick-item:first-child { padding-left: 0; }

  .tick-sym {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tick-price {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-bright);
    font-weight: bold;
  }

  .tick-chg {
    font-family: var(--mono);
    font-size: 10px;
  }

  .tick-chg.up { color: var(--green); }
  .tick-chg.dn { color: var(--red); }
  .tick-chg.flat { color: var(--text-dim); }

  #ticker-updated {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    padding-left: 14px;
  }

  /* ── LAYOUT ── */
  #main {
    margin-top: 82px; /* nav + ticker */
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: auto;
    gap: 16px;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
    margin-top: 98px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .card.wide { grid-column: span 2; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
  }

  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: bold;
  }

  .card-headline {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    font-family: var(--serif);
    font-style: italic;
    line-height: 1.3;
  }

  .card-timestamp {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── TABLES ── */
  .quote-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 11px;
    margin-bottom: 4px;
  }

  .quote-table th {
    text-align: left;
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 4px 6px 4px;
    border-bottom: 1px solid var(--border);
  }

  .quote-table th:not(:first-child) { text-align: right; }

  .quote-table td {
    padding: 5px 4px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .quote-table tr:last-child td { border-bottom: none; }

  .quote-table tr:hover td { background: var(--surface2); }

  .q-sym {
    color: var(--text-bright);
    font-weight: bold;
    font-size: 11px;
  }

  .q-label {
    color: var(--text-dim);
    font-size: 9px;
    display: block;
    margin-top: 1px;
  }

  .q-price {
    text-align: right;
    color: var(--text-bright);
    font-size: 12px;
  }

  .q-chg { text-align: right; font-size: 11px; }
  .q-chg.up { color: var(--green); }
  .q-chg.dn { color: var(--red); }
  .q-chg.flat { color: var(--text-dim); }

  /* ── YIELD BADGE ── */
  .yield-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding: 7px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
  }

  .yield-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .yield-val {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    font-weight: bold;
  }

  .yield-unit {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
  }

  /* ── DIVIDER ── */
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* ── NEWS LIST ── */
  .news-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .news-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .news-item:last-child { border-bottom: none; }

  .news-bullet {
    color: var(--accent-dim);
    font-family: var(--mono);
    font-size: 10px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .news-title {
    font-size: 12px;
    line-height: 1.4;
    color: var(--text);
  }

  .news-title a {
    color: inherit;
    text-decoration: none;
    transition: color 0.1s;
  }

  .news-title a:hover { color: var(--accent); }

  .news-time {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
    display: block;
  }

  /* ── HN STORIES ── */
  .hn-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }

  .hn-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    transition: border-color 0.1s;
  }

  .hn-item:hover { border-color: var(--border2); }

  .hn-rank {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--accent-dim);
    min-width: 18px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .hn-body { flex: 1; min-width: 0; }

  .hn-title {
    font-size: 12px;
    line-height: 1.4;
    color: var(--text);
  }

  .hn-title a {
    color: inherit;
    text-decoration: none;
  }

  .hn-title a:hover { color: var(--accent); }

  .hn-meta {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 3px;
    display: flex;
    gap: 10px;
  }

  .hn-meta .up { color: var(--green); }
  .hn-meta .cm { color: var(--text-dim); }

  /* ── SPORTS ── */
  .sport-section { margin-bottom: 12px; }

  .sport-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 6px;
  }

  .game-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 4px;
    font-family: var(--mono);
    font-size: 11px;
    gap: 8px;
  }

  .game-teams { flex: 1; min-width: 0; }

  .game-team {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    font-size: 11px;
  }

  .game-score {
    font-size: 13px;
    font-weight: bold;
    color: var(--text-bright);
    text-align: right;
    min-width: 36px;
  }

  .game-status {
    font-size: 9px;
    color: var(--text-dim);
    text-align: right;
    min-width: 40px;
    white-space: nowrap;
  }

  .vs-sep {
    color: var(--text-dim);
    font-size: 9px;
    padding: 0 4px;
  }

  .no-games {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
    padding: 4px 0;
  }

  /* ── INJURY LIST ── */
  .inj-table {
    width: 100%;
    font-family: var(--mono);
    font-size: 10px;
    border-collapse: collapse;
  }

  .inj-table td {
    padding: 4px 4px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .inj-table tr:last-child td { border-bottom: none; }

  .inj-player { color: var(--text-bright); font-weight: bold; }
  .inj-team { color: var(--text-dim); font-size: 9px; }
  .inj-status { color: var(--red); font-size: 9px; }
  .inj-detail { color: var(--text-dim); font-size: 9px; }

  /* ── POLICY ── */
  .policy-item {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .policy-item:last-child { border-bottom: none; }

  .policy-title {
    font-size: 11px;
    line-height: 1.4;
    color: var(--text);
  }

  .policy-title a {
    color: inherit;
    text-decoration: none;
  }

  .policy-title a:hover { color: var(--accent); }

  .policy-time {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── LOADING / ERROR ── */
  #loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  #error-banner {
    display: none;
    position: fixed;
    top: 82px;
    left: 20px; right: 20px;
    z-index: 150;
    background: #1a0a0a;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 16px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    #main {
      grid-template-columns: 1fr;
      padding: 12px;
    }
    .card.wide { grid-column: span 1; }
    #ticker-bar {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tick-item { padding: 0 10px; }
  }

  @media (max-width: 600px) {
    #logo span { display: none; }
    #schema-badge { display: none; }
  }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay">

  <div class="loading-text">FETCHING LIVE DATA&hellip;</div>
</div>

<!-- Error Banner -->
<div id="error-banner"></div>

<!-- Nav -->
<nav id="nav">
  <div id="logo">INFLECTION OS<span>// SIGNAL DASHBOARD</span></div>
  <div class="live-dot" id="live-dot"></div>
  <div id="nav-right">
    <div id="schema-badge">v1.2</div>
    <button id="refresh-btn" onclick="fetchData()">&#x21BB; REFRESH</button>

<!-- Ticker Bar -->
<div id="ticker-bar">
  <div id="ticker-items"></div>
  <div id="ticker-updated"></div>
</div>

<!-- Main Grid -->
<div id="main">

  <!-- MARKETS (wide) -->
  <div class="card wide" id="card-markets">
    <div class="card-header">
      <div>
        <div class="card-title">&#9632; Markets</div>
        <div class="card-headline" id="hl-markets"></div>

      <div class="card-timestamp" id="ts-markets"></div>

  <!-- ENERGY -->
  <div class="card" id="card-energy">
    <div class="card-header">

      </div>
      <div class="card-timestamp" id="ts-energy"></div>
    </div>
    <div id="body-energy"></div>
  </div>

  <!-- COMPANIES (wide) -->
  <div class="card wide" id="card-companies">
    <div class="card-header">
      <div>
        <div class="card-title">&#9632; Companies</div>
        <div class="card-headline" id="hl-companies"></div>

      <div class="card-timestamp" id="ts-companies"></div>
    </div>
    <div id="body-companies"></div>

  <div class="card" id="card-geopolitics">
    <div class="card-header">
      <div>
        <div class="card-title">&#9632; Geopolitics</div>
        <div class="card-headline" id="hl-geopolitics"></div>
      </div>
      <div class="card-timestamp" id="ts-geopolitics"></div>

  <!-- TECHNOLOGY (wide) -->
  <div class="card wide" id="card-technology">

      <div>

<script>
'use strict';

const DATA_URL = 'https://raw.githubusercontent.com/hr185882-creator/inflection-point-research/main/data.json';
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 min
const TICKER_SYMS = ['SPY', 'QQQ', 'BTC-USD', 'NVDA', 'MSFT', 'CL=F'];

let lastData = null;
let refreshTimer = null;

/* ── UTILITIES ── */

function relTime(isoStr) {
  if (!isoStr) return '';
  const now = Date.now();
  const then = new Date(isoStr).getTime();
  if (isNaN(then)) return '';
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function fmtPrice(p, sym) {
  if (p == null) return '—';
  const n = parseFloat(p);
  if (isNaN(n)) return '—';
  if (sym === 'BTC-USD') return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  if (sym === 'EURUSD=X') return n.toFixed(4);
  if (sym === 'DX-Y.NYB') return n.toFixed(2);
  if (n >= 1000) return n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  return n.toFixed(2);
}

function fmtPct(p) {
  if (p == null) return null;
  const n = parseFloat(p);
  if (isNaN(n)) return null;
  const sign = n >= 0 ? '+' : '';
  return sign + n.toFixed(2) + '%';
}

function chgClass(p) {
  if (p == null) return 'flat';
  const n = parseFloat(p);
  if (isNaN(n) || n === 0) return 'flat';
  return n > 0 ? 'up' : 'dn';
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtPub(str) {
  if (!str) return '';
  try {
    const d = new Date(str);
    if (isNaN(d)) return '';
    return relTime(str);
  } catch (e) { return ''; }
}

/* ── TICKER BAR ── */

function renderTicker(data) {
  const mkt = data.domains.markets || {};
  const companies = data.domains.companies || {};
  const energy = data.domains.energy || {};

  // Merge all quotes
  const allQuotes = Object.assign({}, mkt.quotes || {}, companies.quotes || {}, energy.quotes || {});

  const itemsEl = document.getElementById('ticker-items');
  const updEl = document.getElementById('ticker-updated');
  let html = '';

  TICKER_SYMS.forEach(sym => {
    const q = allQuotes[sym];
    if (!q) return;
    const pct = fmtPct(q.change_pct);
    const cls = chgClass(q.change_pct);
    const arrow = cls === 'up' ? '&#9650;' : cls === 'dn' ? '&#9660;' : '&#9644;';
    html += `<div class="tick-item">
      <span class="tick-sym">${esc(sym)}</span>
      <span class="tick-price">${fmtPrice(q.price, sym)}</span>
      ${pct ? `<span class="tick-chg ${cls}">${arrow} ${esc(pct)}</span>` : ''}
    </div>`;
  });

  itemsEl.style.cssText = 'display:flex;align-items:center;flex:1;overflow:hidden;';
  itemsEl.innerHTML = html;

  const fetchedAt = data.fetched_at;
  updEl.innerHTML = fetchedAt ? `Updated ${relTime(fetchedAt)}` : '';
}

/* ── MARKETS CARD ── */

function renderMarkets(d) {
  const q = d.quotes || {};
  const order = ['SPY', 'QQQ', 'GLD', 'TLT', 'BTC-USD', 'EURUSD=X', 'DX-Y.NYB'];
  document.getElementById('hl-markets').textContent = d.headline || '';
  document.getElementById('ts-markets').textContent = relTime(d.last_updated);

  let rows = '';
  order.forEach(sym => {
    const item = q[sym];

/* ── SPORTS CARD ── */

function renderSports(d) {
  document.getElementById('hl-sports').textContent = d.headline || '';
  document.getElementById('ts-sports').textContent = relTime(d.last_updated);

  const scores = d.scores || {};
  const injuries = d.injuries || {};
  const sports = ['nfl', 'nba', 'mlb'];

  let html = '';

  sports.forEach(sp => {
    const section = scores[sp];
    if (!section) return;
    const games = section.games || [];
    html += `<div class="sport-section">
      <div class="sport-label">${esc(section.label || sp.toUpperCase())}</div>`;
    if (games.length === 0) {
      html += '<div class="no-games">No games scheduled.</div>';
    } else {
      games.slice(0, 4).forEach(g => {
        const hs = g.home_score != null ? g.home_score : '';
        const as_ = g.away_score != null ? g.away_score : '';
        const scoreStr = (hs !== '' && as_ !== '') ? `${hs}&ndash;${as_}` : 'vs';
        html += `<div class="game-row">
          <div class="game-teams">
            <div class="game-team">${esc(g.away || '')} <span class="vs-sep">@</span> ${esc(g.home || '')}</div>
          </div>
          <div class="game-score">${scoreStr}</div>
          <div class="game-status">${esc(g.status || '')}</div>
        </div>`;
      });
    }
    html += '</div>';
  });

  // Injuries
  const allInj = [];
  ['nfl', 'nba'].forEach(sp => {
    (injuries[sp] || []).forEach(i => allInj.push({ ...i, sport: sp.toUpperCase() }));
  });

  if (allInj.length) {
    html += `<div class="section-divider"></div>
    <div class="section-label">Injury Report</div>
    <table class="inj-table"><tbody>`;
    allInj.slice(0, 10).forEach(inj => {
      html += `<tr>
        <td><span class="inj-player">${esc(inj.player || '')}</span><br><span class="inj-team">${esc(inj.team || '')} &middot; ${esc(inj.sport)}</span></td>
        <td><span class="inj-status">${esc(inj.status || '')}</span><br><span class="inj-detail">${esc(inj.detail || '')}</span></td>
      </tr>`;
    });
    html += '</tbody></table>';
  }

  document.getElementById('body-sports').innerHTML = html;
}

/* ── MAIN RENDER ── */

function renderAll(data) {
  lastData = data;
  const d = data.domains || {};

  if (d.markets) renderMarkets(d.markets);
  if (d.energy) renderEnergy(d.energy);
  if (d.companies) renderCompanies(d.companies);
  if (d.geopolitics) renderGeopolitics(d.geopolitics);
  if (d.technology) renderTechnology(d.technology);
  if (d.sports) renderSports(d.sports);
  if (d.policy) renderPolicy(d.policy);

  renderTicker(data);

  // Update schema badge
  if (data.schema_version) {
    document.getElementById('schema-badge').textContent = 'v' + data.schema_version;
  }
}

/* ── FETCH ── */

async function fetchData() {
  const btn = document.getElementById('refresh-btn');
  const errEl = document.getElementById('error-banner');
  const overlay = document.getElementById('loading-overlay');

  btn.disabled = true;
  btn.textContent = '... LOADING';
  errEl.style.display = 'none';

  try {
    const url = DATA_URL + '?t=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + res.statusText);
    const data = await res.json();
    renderAll(data);
    overlay.style.display = 'none';
    overlay.style.pointerEvents = 'none';
  } catch (err) {
    console.error('Fetch error:', err);
    errEl.style.display = 'block';
    errEl.textContent = '&#9888; Data fetch failed: ' + err.message + '. Retrying in 60s.';
    if (!lastData) {
      overlay.querySelector('.loading-text').textContent = 'FETCH FAILED — RETRYING...';
    } else {
      overlay.style.display = 'none';
    }
    // Retry sooner on error
    if (refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = setTimeout(fetchData, 60000);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '&#x21BB; REFRESH';
  }
}

/* ── LIVE TIMESTAMP TICK ── */

function tickTimestamps() {
  if (!lastData) return;
  const d = lastData.domains || {};
  const mapping = {
    'ts-markets': d.markets && d.markets.last_updated,
    'ts-energy': d.energy && d.energy.last_updated,
    'ts-companies': d.companies && d.companies.last_updated,
    'ts-geopolitics': d.geopolitics && d.geopolitics.last_updated,
    'ts-technology': d.technology && d.technology.last_updated,
    'ts-sports': d.sports && d.sports.last_updated,
    'ts-policy': d.policy && d.policy.last_updated,
  };
  Object.entries(mapping).forEach(([id, ts]) => {
    const el = document.getElementById(id);
    if (el && ts) el.textContent = relTime(ts);
  });
  const updEl = document.getElementById('ticker-updated');
  if (updEl && lastData.fetched_at) {
    updEl.textContent = 'Updated ' + relTime(lastData.fetched_at);
  }
}

/* ── INIT ── */

(function init() {
  fetchData();

  // Auto-refresh every 5 min
  refreshTimer = setInterval(fetchData, REFRESH_INTERVAL);

  // Tick timestamps every 30s
  setInterval(tickTimestamps, 30000);
})();
</script>
